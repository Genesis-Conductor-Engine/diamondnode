name = "gc-diamond-node"
main = "src/index.ts"
compatibility_date = "2024-05-24"
compatibility_flags = ["nodejs_compat"]

[vars]
NODE_VERSION = "0.1.0"
NODE_ID = "diamond-node"
KEY_ID = "dn-2026-05"

[[routes]]
pattern = "dn.genesisconductor.io/*"
zone_name = "genesisconductor.io"

# Secrets — bind via wrangler CLI before deploying:
#   wrangler secret put DIAMOND_NODE_ED25519_PRIV   # base64 PKCS#8
#   wrangler secret put DIAMOND_NODE_ED25519_PUB    # base64 SPKI
#   wrangler secret put DIAMOND_VAULT_AUDIT_URL     # https://...
